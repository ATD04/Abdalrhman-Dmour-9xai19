# ─────────────────────────────────────────────────────────────────────────────
# Agent Orchestration Microservice — Docker Compose (Independent)
# ─────────────────────────────────────────────────────────────────────────────
services:
  agent-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-service
    ports:
      - "8200:8200"
    env_file:
      - .env
    volumes:
      - agent-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agent-data:
    driver: local
