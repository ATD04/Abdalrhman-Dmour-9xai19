# ─────────────────────────────────────────────────────────────────────────────
# Knowledge & Retrieval Microservice — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
services:
  knowledge-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-service
    ports:
      - "8100:8100"
    env_file:
      - .env
    volumes:
      # Persist database and vector store between restarts
      - knowledge-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  knowledge-data:
    driver: local
